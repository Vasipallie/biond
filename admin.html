<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | BIOND</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-page {
            min-height: 100vh;
            padding-top: 100px;
            background: var(--primary-dark);
        }
        
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 30px 60px;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .admin-header h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        .admin-header p {
            color: var(--text-gray);
        }
        
        .admin-card {
            background: var(--secondary-dark);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            margin-bottom: 30px;
        }
        
        .admin-card h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .admin-card h2 i {
            color: var(--accent-teal);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .video-grid {
            display: grid;
            gap: 15px;
        }
        
        .video-item {
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 20px;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition-medium);
        }
        
        .video-item:hover {
            border-color: var(--accent-teal);
        }
        
        .video-item.featured {
            border-color: var(--accent-green);
            background: rgba(43, 143, 142, 0.05);
        }
        
        .video-thumbnail {
            width: 120px;
            height: 68px;
            background: #000;
            overflow: hidden;
        }
        
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-details h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .video-details p {
            font-size: 13px;
            color: var(--text-gray);
        }
        
        .video-details .featured-badge {
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--gradient-primary);
            color: #000;
            padding: 3px 8px;
            margin-top: 8px;
        }
        
        .video-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-gray);
            cursor: pointer;
            transition: var(--transition-fast);
        }
        
        .btn-icon:hover {
            border-color: var(--accent-teal);
            color: var(--accent-teal);
        }
        
        .btn-icon.delete:hover {
            border-color: #dc3545;
            color: #dc3545;
        }
        
        .btn-icon.star:hover,
        .btn-icon.star.active {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-gray);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.1);
        }
        
        .login-form {
            display: none;
        }
        
        .login-form.active {
            display: block;
        }
        
        .dashboard-content {
            display: none;
        }
        
        .dashboard-content.active {
            display: block;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 30px;
            transition: var(--transition-fast);
        }
        
        .back-link:hover {
            color: var(--accent-teal);
        }
        
        .youtube-preview {
            margin-top: 20px;
            display: none;
        }
        
        .youtube-preview.active {
            display: block;
        }
        
        .youtube-preview iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .video-item {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .video-thumbnail {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }
            
            .video-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="assets/biond.png" alt="BIOND" class="logo-img">
                <span class="logo-tagline">ADMIN PORTAL</span>
            </a>
            <div class="nav-social">
                <a href="index.html" title="Home"><i class="fas fa-home"></i></a>
            </div>
        </div>
    </nav>

    <main class="admin-page">
        <div class="admin-container">
            
            <div class="login-form active" id="loginForm">
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to Website
                </a>
                <div class="admin-card">
                    <div class="admin-header">
                        <h1>ADMIN LOGIN</h1>
                        <p>Enter your credentials to access the dashboard</p>
                    </div>
                    <form id="adminLoginForm">
                        <div class="form-group">
                            <input type="text" id="username" required>
                            <label for="username">Username</label>
                        </div>
                        <div class="form-group">
                            <input type="password" id="password" required>
                            <label for="password">Password</label>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                            <span>Login</span>
                            <i class="fas fa-sign-in-alt"></i>
                        </button>
                    </form>
                    <p style="margin-top: 20px; text-align: center; color: var(--text-gray); font-size: 12px;">
                        Demo: admin / biond2024
                    </p>
                </div>
            </div>

            
            <div class="dashboard-content" id="dashboardContent">
                <a href="#" class="back-link" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
                
                <div class="admin-header">
                    <h1>VIDEO DASHBOARD</h1>
                    <p>Manage your YouTube video embeds</p>
                </div>

                
                <div class="admin-card">
                    <h2><i class="fas fa-plus-circle"></i> Add New Video</h2>
                    <form id="addVideoForm">
                        <div class="form-row">
                            <div class="form-group">
                                <input type="text" id="videoTitle" required>
                                <label for="videoTitle">Video Title</label>
                            </div>
                            <div class="form-group">
                                <input type="text" id="youtubeUrl" required placeholder=" ">
                                <label for="youtubeUrl">YouTube URL or Video ID</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <textarea id="videoDescription" rows="3" required></textarea>
                            <label for="videoDescription">Description</label>
                        </div>
                        <div class="youtube-preview" id="youtubePreview">
                            <iframe id="previewFrame" src="" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div style="display: flex; gap: 15px; margin-top: 20px;">
                            <button type="button" class="btn btn-outline" id="previewBtn">
                                <i class="fas fa-eye"></i>
                                <span>Preview</span>
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-upload"></i>
                                <span>Add Video</span>
                            </button>
                        </div>
                    </form>
                </div>

                
                <div class="admin-card">
                    <h2><i class="fas fa-video"></i> Manage Videos</h2>
                    <div class="video-grid" id="videoGrid">
                        
                    </div>
                </div>
            </div>
        </div>
    </main>

    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const dashboardContent = document.getElementById('dashboardContent');
            const adminLoginForm = document.getElementById('adminLoginForm');
            const addVideoForm = document.getElementById('addVideoForm');
            const videoGrid = document.getElementById('videoGrid');
            const logoutBtn = document.getElementById('logoutBtn');
            const previewBtn = document.getElementById('previewBtn');
            const youtubePreview = document.getElementById('youtubePreview');
            const previewFrame = document.getElementById('previewFrame');
            
            
            if (sessionStorage.getItem('biond_admin_logged_in')) {
                showDashboard();
            }
            
            
            adminLoginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                
                if (username === 'admin' && password === 'biond2024') {
                    sessionStorage.setItem('biond_admin_logged_in', 'true');
                    showDashboard();
                    showNotification('Welcome to the dashboard!', 'success');
                } else {
                    showNotification('Invalid credentials', 'error');
                }
            });
            
            
            logoutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                sessionStorage.removeItem('biond_admin_logged_in');
                loginForm.classList.add('active');
                dashboardContent.classList.remove('active');
                showNotification('Logged out successfully', 'success');
            });
            
            
            previewBtn.addEventListener('click', function() {
                const url = document.getElementById('youtubeUrl').value;
                const videoId = extractYouTubeId(url);
                
                if (videoId) {
                    previewFrame.src = `https://www.youtube.com/embed/${videoId}`;
                    youtubePreview.classList.add('active');
                } else {
                    showNotification('Please enter a valid YouTube URL', 'error');
                }
            });
            
            
            addVideoForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const title = document.getElementById('videoTitle').value;
                const url = document.getElementById('youtubeUrl').value;
                const description = document.getElementById('videoDescription').value;
                const videoId = extractYouTubeId(url);
                
                if (!videoId) {
                    showNotification('Invalid YouTube URL', 'error');
                    return;
                }
                
                
                const existingVideos = await VideoManager.getAll();
                const isFirst = existingVideos.length === 0;
                
                const video = await VideoManager.add({
                    title: title,
                    description: description,
                    youtubeId: videoId,
                    featured: isFirst
                });
                
                if (video) {
                    showNotification('Video added successfully!', 'success');
                    addVideoForm.reset();
                    youtubePreview.classList.remove('active');
                    await loadVideos();
                } else {
                    showNotification('Error adding video', 'error');
                }
            });
            
            function showDashboard() {
                loginForm.classList.remove('active');
                dashboardContent.classList.add('active');
                loadVideos();
            }
            
            async function loadVideos() {
                
                videoGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading videos...</p>
                    </div>
                `;
                
                const videos = await VideoManager.getAll();
                
                if (videos.length === 0) {
                    videoGrid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-video-slash"></i>
                            <p>No videos added yet. Add your first video above!</p>
                        </div>
                    `;
                    return;
                }
                
                videoGrid.innerHTML = videos.map(video => `
                    <div class="video-item ${video.featured ? 'featured' : ''}" data-id="${video.id}">
                        <div class="video-thumbnail">
                            <img src="https://img.youtube.com/vi/${video.youtube_id}/mqdefault.jpg" alt="${video.title}">
                        </div>
                        <div class="video-details">
                            <h4>${video.title}</h4>
                            <p>${video.description}</p>
                            ${video.featured ? '<span class="featured-badge">Featured</span>' : ''}
                        </div>
                        <div class="video-actions">
                            <button class="btn-icon star ${video.featured ? 'active' : ''}" title="Set as Featured" data-action="feature" data-id="${video.id}">
                                <i class="fas fa-star"></i>
                            </button>
                            <button class="btn-icon delete" title="Delete" data-action="delete" data-id="${video.id}">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
                
                
                videoGrid.querySelectorAll('[data-action="feature"]').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const id = this.getAttribute('data-id');
                        const success = await VideoManager.setFeatured(id);
                        if (success) {
                            await loadVideos();
                            showNotification('Featured video updated!', 'success');
                        } else {
                            showNotification('Error updating featured video', 'error');
                        }
                    });
                });
                
                videoGrid.querySelectorAll('[data-action="delete"]').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const id = this.getAttribute('data-id');
                        if (confirm('Are you sure you want to delete this video?')) {
                            const success = await VideoManager.remove(id);
                            if (success) {
                                await loadVideos();
                                showNotification('Video deleted', 'success');
                            } else {
                                showNotification('Error deleting video', 'error');
                            }
                        }
                    });
                });
            }
            
            function extractYouTubeId(url) {
                if (!url) return null;
                
                
                if (/^[a-zA-Z0-9_-]{11}$/.test(url)) {
                    return url;
                }
                
                
                const patterns = [
                    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
                    /youtube\.com\/watch\?.*v=([a-zA-Z0-9_-]{11})/
                ];
                
                for (const pattern of patterns) {
                    const match = url.match(pattern);
                    if (match) return match[1];
                }
                
                return null;
            }
        });
    </script>
</body>
</html>
